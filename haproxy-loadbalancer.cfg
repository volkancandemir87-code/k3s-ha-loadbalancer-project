global
    daemon
    maxconn 256

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

frontend yenikapi
    bind *:8080
    default_backend icerikapi

backend icerikapi
    balance roundrobin
    server kf-dr-prod-ms01 192.168.217.128:32000 check
    server demircanvolkan 192.168.217.129:32000 check
