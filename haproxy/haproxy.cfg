global
    daemon
    maxconn 256

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

frontend http_front
    bind *:80
    default_backend nginx_back

frontend stats
    bind *:9000
    stats enable
    stats uri /stats
    stats refresh 5s

backend nginx_back
    balance roundrobin
    server sunucu1 192.168.217.128:8080 check
    server sunucu2 192.168.217.129:8080 check
